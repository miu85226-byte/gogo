<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나무발발이 - 현장 관리 달력</title>
    
    <!-- 라이브러리 (FullCalendar) -->
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="app-header">
        <h1>🌲 현장 관리 시스템 🏗️</h1>
        <p>현장별 일정을 스마트하게 관리하세요</p>
        <div id="connection-status" class="status-offline">서버 연결 확인 중...</div>
    </header>

    <div id='calendar-container'>
        <div id='calendar'></div>
    </div>

    <!-- 일정 등록/수정 모달 -->
    <div id="eventModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modalTitle">현장 일정 기록</h2>
            <form id="eventForm">
                <input type="hidden" id="eventId">
                
                <div class="input-group">
                    <label>현장명</label>
                    <input type="text" id="siteName" placeholder="예: 서초동 아파트 현장" list="siteNameList" autocomplete="off" required>
                    <datalist id="siteNameList"></datalist>
                </div>
                
                <div class="input-group">
                    <label>현장 구분 (색상)</label>
                    <select id="siteColor">
                        <option value="#3788d8" style="background-color: #3788d8; color: white;">파랑 (일반)</option>
                        <option value="#e74c3c" style="background-color: #e74c3c; color: white;">빨강 (긴급/중요)</option>
                        <option value="#2ecc71" style="background-color: #2ecc71; color: white;">초록 (진행중)</option>
                        <option value="#f1c40f" style="background-color: #f1c40f; color: black;">노랑 (대기)</option>
                        <option value="#9b59b6" style="background-color: #9b59b6; color: white;">보라 (기타)</option>
                    </select>
                </div>

                <div class="row">
                    <div class="input-group">
                        <label>시작일</label>
                        <input type="date" id="startDate" required>
                    </div>
                    <div class="input-group">
                        <label>종료일</label>
                        <input type="date" id="endDate" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>상세 업무 내용</label>
                    <textarea id="description" rows="4" placeholder="작업 지시 및 특이사항을 적어주세요"></textarea>
                </div>
                
                <div class="btn-group">
                    <button type="submit" id="saveBtn" class="btn primary">저장하기</button>
                    <button type="button" id="deleteBtn" class="btn danger" style="display:none;">일정 삭제</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
